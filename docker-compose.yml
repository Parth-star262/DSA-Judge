services:
  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    ports:
      - "5002:5001"

  worker:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    command: npm run worker

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:5002/api
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5002/api
      NODE_ENV: production
    ports:
      - "3001:3000"