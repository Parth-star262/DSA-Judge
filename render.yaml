services:
  - type: web
    name: dsa-judge-backend
    env: node
    plan: free
    branch: main
    repo: https://github.com/Parth-star262/DSA-Judge
    rootDir: backend
    buildCommand: npm ci && npx prisma generate && npx prisma db push && node prisma/seed.js
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        sync: false
  - type: worker
    name: dsa-judge-worker
    env: node
    plan: starter
    branch: main
    repo: https://github.com/Parth-star262/DSA-Judge
    rootDir: backend
    buildCommand: npm ci && npx prisma generate && npx prisma db push
    startCommand: npm run worker
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        sync: false

# Notes:
# - After importing this `render.yaml` in Render, open each service and add real secret values
#   for the env vars (DATABASE_URL, REDIS_URL, JWT_SECRET, etc.) in the Render dashboard.
# - The `releaseCommand` runs migrations and seed during deploy; remove if you prefer manual migration.
