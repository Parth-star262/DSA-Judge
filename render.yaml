services:
  - type: web
    name: dsa-judge-backend
    env: node
    plan: free
    branch: main
    repo: https://github.com/Parth-star262/DSA-Judge
    rootDir: backend
    buildCommand: npm ci && npx prisma generate && npx prisma db push && node prisma/seed.js
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        sync: false
# Notes:
# - After importing this `render.yaml` in Render, open each service and add real secret values
#   for the env vars (DATABASE_URL, REDIS_URL, JWT_SECRET, etc.) in the Render dashboard.
# - Submissions execute synchronously in the web service; no background worker is required.
