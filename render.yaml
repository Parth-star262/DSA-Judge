services:
  - type: web
    name: dsa-judge-backend
    env: node
    plan: free
    branch: main
    repo: https://github.com/Parth-star262/DSA-Judge
    rootDir: backend
    buildCommand: npm ci && npx prisma generate
    startCommand: npm start
    releaseCommand: npx prisma migrate deploy && node prisma/seed.js
    envVars:
      - key: PORT
        value: "5001"
      - key: DATABASE_URL
        from: env
      - key: REDIS_URL
        from: env
      - key: JWT_SECRET
        from: env
      - key: JUDGE0_URL
        from: env
      - key: JUDGE0_API_KEY
        from: env
      - key: GEMINI_API_KEY
        from: env
      - key: GROQ_API_KEY
        from: env

  - type: worker
    name: dsa-judge-worker
    env: node
    plan: free
    branch: main
    repo: https://github.com/Parth-star262/DSA-Judge
    rootDir: backend
    buildCommand: npm ci && npx prisma generate
    startCommand: npm run worker
    envVars:
      - key: DATABASE_URL
        from: env
      - key: REDIS_URL
        from: env
      - key: JWT_SECRET
        from: env
      - key: JUDGE0_URL
        from: env
      - key: JUDGE0_API_KEY
        from: env

# Notes:
# - After importing this `render.yaml` in Render, open each service and add real secret values
#   for the env vars (DATABASE_URL, REDIS_URL, JWT_SECRET, etc.) in the Render dashboard.
# - The `releaseCommand` runs migrations and seed during deploy; remove if you prefer manual migration.
